<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
  <style>
    body { font-family: monospace; padding: 2rem; }
    #result { background: #f0f0f0; padding: 1rem; margin-top: 1rem; white-space: pre-wrap; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>API Key Test</h1>
  <button onclick="testAPI()">Test API Key</button>
  <div id="result"></div>

  <script>
    const API_KEY = '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';

    async function testAPI() {
      const result = document.getElementById('result');
      result.textContent = 'Testing API...';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-3-5-sonnet-20241022',
            max_tokens: 100,
            messages: [{ role: 'user', content: 'Say hello' }],
          }),
        });

        const data = await response.json();
        result.textContent = `Status: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
      } catch (error) {
        result.textContent = `Error: ${error.message}`;
      }
    }
  </script>
</body>
</html>
